<!DOCTYPE html>
<html lang="ca">
<head>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <title>Qüestionari DUA</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- Títol -->
    <h1 class="mb-4 text-center">
        Qüestionari sobre el Disseny Universal de l'Aprenentatge
    </h1>

    <!-- Pregunta -->
    <div class="card p-4">
        <h5 class="mb-3">
    <meta charset="UTF-8">
    <meta Disseny Universal de l'Aprenentatge (DUA)?    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        </h5>

        <!-- Respostes -->
        <form>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="pregunta1" id="opt1">
                <label class="form-check-label" for="opt1">
                    Proporcionar múltiples formes de representació
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="pregunta1" id="opt2">
                <label class="form-check-label" for="opt2">
                    Fer un únic tipus d’examen
                </label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="radio" name="pregunta1" id="opt3">
                <label class="form-check-label" for="opt3">
                    Utilitzar només llibres de text
                </label>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="radio" name="pregunta1" id="opt4">
                <label class="form-check-label" for="opt4">
                    Evitar l'ús de tecnologia a l'aula
                </label>
            </div>

            <!-- Botó -->
            <button type="button" class="btn btn-primary">
                CORREGIR
            </button>
        </form>
    </div>
</body>
</html>
